<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Adventure</title>

</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        width: 100%;
        min-height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        overflow: hidden;

        font-family: Arial, sans-serif;

        background:
            radial-gradient(circle at top left, #001d3d, #000814),
            black;

        color: white;

        position: relative;
    }

    /* ================= STAR EFFECT ================= */
    .stars {
        position: absolute;
        width: 100%;
        height: 100%;

        background-image:
            radial-gradient(white 1px, transparent 1px);

        background-size: 40px 40px;

        opacity: 0.2;

        animation: moveStars 20s linear infinite;
    }

    @keyframes moveStars {
        from {
            transform: translateY(0);
        }

        to {
            transform: translateY(40px);
        }
    }

    /* ================= HOME BOX ================= */
    #home {
        width: 90%;
        max-width: 500px;

        padding: 40px 30px;

        border-radius: 30px;

        background: rgba(0, 0, 0, 0.5);

        backdrop-filter: blur(10px);

        text-align: center;

        border: 2px solid rgba(0, 255, 255, 0.3);

        box-shadow:
            0 0 30px rgba(0, 255, 255, 0.4),
            0 0 60px rgba(255, 0, 255, 0.2);

        z-index: 10;

        animation: floatBox 3s ease-in-out infinite;
    }

    @keyframes floatBox {

        0%,
        100% {
            transform: translateY(0px);
        }

        50% {
            transform: translateY(-10px);
        }
    }

    /* ================= LOGO ================= */
    .logo {
        font-size: 70px;

        margin-bottom: 20px;

        animation: rocketFly 1s infinite alternate;
    }

    @keyframes rocketFly {
        from {
            transform: translateY(0px);
        }

        to {
            transform: translateY(-10px);
        }
    }

    /* ================= TITLE ================= */
    h1 {
        font-size: 55px;
        font-weight: bold;

        margin-bottom: 15px;

        background: linear-gradient(90deg,
                cyan,
                #00aaff,
                #ff00ff);

        background-clip: text;
        -webkit-background-clip: text;

        color: transparent;
        -webkit-text-fill-color: transparent;

        text-shadow:
            0 0 10px rgba(0, 255, 255, 0.5),
            0 0 20px rgba(255, 0, 255, 0.3);
    }

    /* ================= DESC ================= */
    .desc {
        font-size: 18px;

        opacity: 0.8;

        margin-bottom: 35px;

        line-height: 1.5;
    }

    /* ================= BUTTON ================= */
    #startBtn {
        padding: 18px 45px;

        border: none;
        border-radius: 15px;

        font-size: 20px;
        font-weight: bold;

        color: white;

        cursor: pointer;

        background: linear-gradient(90deg,
                #00d4ff,
                #0066ff);

        box-shadow:
            0 0 20px cyan,
            0 0 40px rgba(0, 255, 255, 0.4);

        transition: 0.25s;
    }

    #startBtn:hover {
        transform: scale(1.08);

        box-shadow:
            0 0 30px cyan,
            0 0 60px rgba(0, 255, 255, 0.6);
    }

    #startBtn:active {
        transform: scale(0.96);
    }

    /* ================= HP RESPONSIVE ================= */
    @media (max-width: 600px) {

        body {
            padding: 15px;
        }

        #home {
            width: 100%;
            padding: 30px 20px;

            border-radius: 25px;
        }

        h1 {
            font-size: 38px;
        }

        .logo {
            font-size: 55px;
        }

        .desc {
            font-size: 15px;
        }

        #startBtn {
            width: 100%;

            padding: 16px;

            font-size: 18px;
        }
    }
</style>

<body>

    <!-- BACKGROUND EFFECT -->
    <div class="stars"></div>

    <!-- HOME -->
    <div id="home">

        <div class="logo">🚀</div>

        <h1>SPACE ADVENTURE</h1>

        <p class="desc">
            di buat dengan cinta dan kasih sayang
        </p>

        <button onclick="startGame()" id="startBtn">
            ▶ START GAME
        </button>

    </div>
    <!-- MUSIC -->
    <audio id="bgMusic" loop autoplay>
        <source src="sound/kicau.mp3" type="audio/mpeg">
    </audio>

    <script>

        let music = document.getElementById("bgMusic");

        // volume
        music.volume = 0.4;

        // coba autoplay
        window.addEventListener("load", () => {

            let playPromise = music.play();

            if (playPromise !== undefined) {

                playPromise.catch(() => {

                    // kalau autoplay diblok HP
                    document.body.addEventListener("touchstart", startMusic, { once: true });
                    document.body.addEventListener("click", startMusic, { once: true });

                });
            }
        });

        function startMusic() {
            music.play();
        }

        function startGame() {
            window.location.href = "game.html";
        }

    </script>

</body>

</html>
